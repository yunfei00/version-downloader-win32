name: Build Windows EXE

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            RELEASE_VERSION="${GITHUB_REF_NAME}"
          else
            RELEASE_VERSION="dev-${GITHUB_SHA::7}"
          fi

          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> "$GITHUB_ENV"
          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build EXE (Release)
        shell: cmd
        run: |
          set CL=/utf-8 %CL%
          call build.bat
          if not exist build\http_directory_scanner.obj (
            echo ERROR: src/http_directory_scanner.cpp was not compiled.
            exit /b 1
          )

      - name: Package ZIP
        id: pack
        shell: cmd
        run: |
          if not exist dist mkdir dist
          set ZIP_PATH=dist\version-downloader-win32-${{ env.RELEASE_VERSION }}.zip
          powershell -NoProfile -Command "Compress-Archive -Path 'build/version-downloader.exe','build/README.md','build/sample_versions.csv' -DestinationPath '%ZIP_PATH%' -Force"
          echo zip_path=%ZIP_PATH%>> %GITHUB_OUTPUT%

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: version-downloader.exe
          path: build/version-downloader.exe

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: version-downloader-win32-${{ env.RELEASE_VERSION }}.zip
          path: ${{ steps.pack.outputs.zip_path }}

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/version-downloader.exe
            dist/version-downloader-win32-${{ env.RELEASE_VERSION }}.zip
