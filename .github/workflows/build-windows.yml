name: Build Windows EXE

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release version
        id: meta
        shell: cmd
        run: |
          set RELEASE_VERSION=v0.1.0
          if "${{ github.ref_type }}"=="tag" set RELEASE_VERSION=${{ github.ref_name }}
          echo release_version=%RELEASE_VERSION%>> %GITHUB_OUTPUT%

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build EXE (Release)
        shell: cmd
        run: |
          call build.bat

      - name: Package ZIP
        id: pack
        shell: cmd
        run: |
          if not exist dist mkdir dist
          set ZIP_PATH=dist\version-downloader-win32-${{ steps.meta.outputs.release_version }}.zip
          powershell -NoProfile -Command "Compress-Archive -Path 'build/version-downloader.exe','build/README.md','build/sample_versions.csv' -DestinationPath '%ZIP_PATH%' -Force"
          echo zip_path=%ZIP_PATH%>> %GITHUB_OUTPUT%

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: version-downloader.exe
          path: build/version-downloader.exe

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: version-downloader-win32-${{ steps.meta.outputs.release_version }}.zip
          path: ${{ steps.pack.outputs.zip_path }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            build/version-downloader.exe
            ${{ steps.pack.outputs.zip_path }}
