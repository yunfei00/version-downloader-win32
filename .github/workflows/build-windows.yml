name: Build Windows EXE

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            RELEASE_VERSION="${GITHUB_REF_NAME}"
          else
            RELEASE_VERSION="dev-${GITHUB_SHA::7}"
          fi

          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> "$GITHUB_ENV"
          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build EXE (Release)
        shell: cmd
        run: |
          if not exist build mkdir build
          del /q build\*.obj build\*.res build\version-downloader.exe 2>nul
          for /f %%i in ('git rev-parse --short HEAD 2^>nul') do set GIT_COMMIT=%%i
          if "%GIT_COMMIT%"=="" set GIT_COMMIT=dev

          cl /nologo /utf-8 /std:c++17 /EHsc /O2 /MD /DUNICODE /D_UNICODE /DWIN32 /D_WINDOWS /DNDEBUG /DBUILD_COMMIT=L"%GIT_COMMIT%" /c ^
            src\main.cpp ^
            src\app.cpp ^
            src\ui.cpp ^
            src\csv_parser.cpp ^
            src\logger.cpp ^
            src\download_worker.cpp ^
            src\hash_utils.cpp ^
            src\string_utils.cpp ^
            src\http_directory_scanner.cpp ^
            /Fo:build\
          if errorlevel 1 exit /b 1

          rc /nologo /d NDEBUG /fo build\version.res src\version.rc
          if errorlevel 1 exit /b 1

          link /nologo /OUT:build\version-downloader.exe ^
            build\main.obj ^
            build\app.obj ^
            build\ui.obj ^
            build\csv_parser.obj ^
            build\logger.obj ^
            build\download_worker.obj ^
            build\hash_utils.obj ^
            build\string_utils.obj ^
            build\http_directory_scanner.obj ^
            build\version.res ^
            comctl32.lib winhttp.lib comdlg32.lib shell32.lib user32.lib gdi32.lib advapi32.lib ole32.lib
          if errorlevel 1 exit /b 1

          copy /Y README.md build\README.md >nul
          copy /Y sample_versions.csv build\sample_versions.csv >nul

      - name: Package ZIP
        id: pack
        shell: cmd
        run: |
          if not exist dist mkdir dist
          set ZIP_PATH=dist\version-downloader-win32-${{ env.RELEASE_VERSION }}.zip
          powershell -NoProfile -Command "Compress-Archive -Path 'build/version-downloader.exe','build/README.md','build/sample_versions.csv' -DestinationPath '%ZIP_PATH%' -Force"
          echo zip_path=%ZIP_PATH%>> %GITHUB_OUTPUT%

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: version-downloader.exe
          path: build/version-downloader.exe

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: version-downloader-win32-${{ env.RELEASE_VERSION }}.zip
          path: ${{ steps.pack.outputs.zip_path }}

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/version-downloader.exe
            dist/version-downloader-win32-${{ env.RELEASE_VERSION }}.zip
